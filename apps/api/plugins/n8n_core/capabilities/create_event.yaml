name: n8n.calendar.create_event
abstract_intent: CreateCalendarEvent
description: "Use this capability to create, schedule, or book events, meetings, and appointments in the user's calendar (e.g., Google Calendar, Agenda)."
driver: rest_n8n
endpoint: /webhook/calendar/create_event
method: POST
schema:
  type: object
  properties:
    title:
      type: string
    start_time:
      type: string
      description: "The start time of the event in ISO-8601 format (e.g. 2026-07-03T14:00:00Z). Calculate relative dates like 'tomorrow' or 'next friday' based on current context."
    end_time:
      type: string
      description: "MANDATORY FIELD. The end time of the event in ISO-8601 format. You MUST calculate this and include it. If user doesn't specify, add 1 hour to start_time."
  required: [title, start_time, end_time]
