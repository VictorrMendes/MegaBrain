name: n8n.communication.send_message
description: Sends a generic message via a messaging platform (e.g. WhatsApp, Slack, Telegram).
abstract_intent: communication.send_message
schema:
  type: object
  properties:
    provider:
      type: string
      description: The provider to use (e.g. whatsapp/evolution, slack, telegram).
      enum: [evolution, slack, telegram]
    chat_id:
      type: string
      description: The chat ID if sending via Telegram.
    phone:
      type: string
      description: The phone number if sending via WhatsApp (evolution).
    message:
      type: string
      description: The content of the message.
  required: [message, provider]
