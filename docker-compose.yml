services:

  # ──────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paios}
      POSTGRES_USER: ${POSTGRES_USER:-paios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paios}
    volumes:
      - /mnt/dados/paios/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /mnt/dados/paios/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ~/.ollama:/root/.ollama
    ports:
      - "11434:11434"

  # ──────────────────────────────────────────
  # Applications
  # ──────────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8100"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8100
    depends_on:
      api:
        condition: service_healthy
