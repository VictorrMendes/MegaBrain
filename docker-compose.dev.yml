# Override para desenvolvimento local (Windows)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Diferenças do ambiente de produção:
# - Volumes nomeados (não usa /mnt/dados)
# - Somente infra sobe via compose; API e Web rodam localmente com hot reload

services:

  postgres:
    volumes:
      - khonshu_postgres_dev:/var/lib/postgresql/data

  redis:
    volumes:
      - khonshu_redis_dev:/data

  # API e Web não sobem via compose no dev — rodam localmente:
  #   uv run fastapi dev apps/api/main.py --port 8100
  #   pnpm --filter web dev
  api:
    profiles: ["prod"]

  web:
    profiles: ["prod"]

volumes:
  khonshu_postgres_dev:
  khonshu_redis_dev:
